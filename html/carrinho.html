<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veloz Tênis | Carrinho</title>
  <link rel="manifest" href="../json/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-page="carrinho">

  <div class="loader-screen" id="loader">
    <div class="loader-brand">
      <span class="loader-logo"><img src="../images/logo.png" alt="Logo"></span>
      <p>Sincronizando seu carrinho...</p>
      <div class="loader-bar"><span></span></div>
    </div>
  </div>

  <div id="promo-bar"></div>
  <header id="site-header"></header>
  <nav class="mobile-nav" id="mobile-nav">
    <a href="../index.html">🏠 Home</a>
    <a href="catalogo.html">👟 Catálogo</a>
    <a href="wishlist.html">❤️ Favoritos</a>
    <a href="carrinho.html" class="active">🛒 Carrinho</a>
    <a href="checkout.html">⚡ Checkout</a>
  </nav>
  <div class="bottom-bar" id="bottom-bar"></div>

  <main class="page">
    <section class="section">
      <div class="container">
        <div class="section-heading reveal">
          <div>
            <span class="eyebrow">seu carrinho</span>
            <h1>Revise sua corrida</h1>
            <p>Controle quantidade, calcule frete e aplique cupons com feedback em tempo real.</p>
          </div>
        </div>
        <div id="cart-page"></div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>
  <div class="toast-container" id="toast-container"></div>
  <button class="scroll-top" id="scroll-top" aria-label="Voltar ao topo">↑</button>
  <div id="modal-root"></div>
  <div id="mini-cart-root"></div>

  <!-- Scripts da aplicação -->
  <script src="../js/produtos.js"></script>
  <script src="../js/animations.js"></script>
  <script src="../js/app.js"></script>
  <script>
    // Registro do PWA com auto-update forçado
    if('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../service-worker.js', { scope: '../' })
        .then(reg => reg.update()).catch(()=>{});
      
      // Limpa caches antigos
      if('caches' in window) {
        caches.keys().then(names => {
          names.forEach(name => {
            if(name.includes('veloztenis-v') && !name.includes('v5')) {
              caches.delete(name);
            }
          });
        });
      }
    }
  </script>
</body>
</html>
