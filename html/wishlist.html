<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veloz Tênis | Meus Favoritos</title>
  <link rel="manifest" href="../json/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-page="wishlist">

  <div class="loader-screen" id="loader">
    <div class="loader-brand">
      <span class="loader-logo"><img src="../images/veloz-logo.png" alt="Logo"></span>
      <p>Carregando seus favoritos...</p>
      <div class="loader-bar"><span></span></div>
    </div>
  </div>

  <div id="promo-bar"></div>
  <header id="site-header"></header>
  <nav class="mobile-nav" id="mobile-nav">
    <a href="../index.html">🏠 Home</a>
    <a href="catalogo.html">👟 Catálogo</a>
    <a href="wishlist.html" class="active">❤️ Favoritos</a>
    <a href="carrinho.html">🛒 Carrinho</a>
    <a href="checkout.html">⚡ Checkout</a>
  </nav>
  <div class="bottom-bar" id="bottom-bar"></div>

  <main class="page">
    <section class="section">
      <div class="container">
        <div class="section-heading reveal">
          <div>
            <span class="eyebrow">seus favoritos</span>
            <h1>Lista de desejos</h1>
            <p>Produtos que você salvou para comprar depois. Persiste no navegador via localStorage.</p>
          </div>
        </div>
        <div id="wishlist-page"></div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>
  <div class="toast-container" id="toast-container"></div>
  <button class="scroll-top" id="scroll-top" aria-label="Voltar ao topo">↑</button>
  <div id="modal-root"></div>
  <div id="mini-cart-root"></div>

  <!-- Scripts da aplicação -->
  <script src="../js/produtos.js"></script>
  <script src="../js/animations.js"></script>
  <script src="../js/app.js"></script>
  <script>
    // Registro do PWA
    if('serviceWorker' in navigator) navigator.serviceWorker.register('../service-worker.js', { scope: '../' }).catch(()=>{});
  </script>
</body>
</html>
